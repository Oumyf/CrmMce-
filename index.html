<!doctype html>
<html lang="fr" class="notranslate" translate="no">
  <head>
    <!-- Dark mode : appliquer le thème AVANT le rendu React pour éviter le flash -->
    <script>
      (function () {
        var theme = localStorage.getItem("theme");
        if (theme === "dark") {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
    <meta name="google" content="notranslate" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MCE Agency — CRM</title>
    <meta name="description" content="MCE Agency — Plateforme CRM interne" />
    <meta name="author" content="MCE Agency" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <meta property="og:title" content="MCE Agency CRM" />
    <meta property="og:description" content="Gérez vos leads, clients et projets depuis MCE Agency." />
    <meta property="og:type" content="website" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
